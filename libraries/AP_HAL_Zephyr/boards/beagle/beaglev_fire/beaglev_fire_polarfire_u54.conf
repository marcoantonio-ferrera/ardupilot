CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_REBOOT=y

# FPU + sharing — U54 has F+D; must match the WAF-side -march=rv64imafdc/-mabi=lp64d
# so kernel and ArduPilot .o files share one ABI in the linked ELF.
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# -O2 for kernel / out-of-tree drivers — default is -Os.
CONFIG_SPEED_OPTIMIZATIONS=y

# 1 kHz tick so k_usleep(1000) is exactly one tick (MPFS default is 500 Hz)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# main at 8 so ap_timer/ap_io (prio 2, 5) can preempt
CONFIG_MAIN_THREAD_PRIORITY=8

CONFIG_THREAD_NAME=y

# EKF3 needs ~6-10 MB of heap; 32 MB is comfortable on a 4 GB board.
CONFIG_MAIN_STACK_SIZE=262144
CONFIG_HEAP_MEM_POOL_SIZE=33554432

# CONFIG_STACK_CANARIES=y  # re-enable for debug only — costs IMU/EKF perf

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# floor Serial0 baud so a stale SERIAL0_BAUD can't lock the user out of the GCS
CONFIG_AP_HAL_UART_SERIAL0_MIN_BAUD=115200
# MPFS MMUART THRE is edge-triggered — if tx_enable is called while the FIFO is
# already empty, no interrupt fires and the ring buffer stalls. This makes the
# driver invoke our callback directly in that case.
CONFIG_UART_NS16550_WA_TX_FIFO_EMPTY_INTERRUPT=y

# pin CPU count to 1 — DTS has cpu@1..4 but Zephyr only runs one hart, and
# auto-derived MP_MAX_NUM_CPUS=4 makes plic_irq_enable_set_state() clear the
# enable bit for our hart instead of setting it (every i2c_transfer → -EAGAIN).
CONFIG_MP_MAX_NUM_CPUS=1
CONFIG_RV_BOOT_HART=4

CONFIG_I2C=y

CONFIG_SPI=y

# minimal LOG so driver printks land on the console without a deferred buffer
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

# SPI/SDHC at INFO — DBG overruns the UART TX FIFO
CONFIG_SPI_LOG_LEVEL_INF=y
CONFIG_SDHC_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=8192

CONFIG_GPIO=y
# GPIO hogs drive VIO_ENABLE high at boot so FPGA I/O buffers are powered
CONFIG_GPIO_HOGS=y

# PWM must be on — RCOutput.cpp is #ifdef CONFIG_PWM around the whole path
CONFIG_PWM=y

# params + logs live on the microSD FAT32 volume. BVF gateware doesn't route
# QSPI and eMMC belongs to HSS/Linux, so no ZMS-on-NOR path.
CONFIG_CRC=y

# microSD via MSS SPI1 (shared with MCP3464 ADC). zephyr,sdhc-spi-slot runs the
# CMD/DAT protocol; format as FAT32 before first use.
CONFIG_SDHC=y
CONFIG_SPI_SDHC=y
CONFIG_SDMMC_STACK=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FAT_FILESYSTEM_ELM=y
# ardupilot.bin is 13 chars — without LFN, f_open returns FR_INVALID_NAME
CONFIG_FS_FATFS_LFN=y

# POSIX API for AP_Filesystem_Posix
CONFIG_POSIX_API=y
CONFIG_POSIX_FILE_SYSTEM=y
CONFIG_POSIX_FSYNC=y
CONFIG_FILE_SYSTEM=y
# CONFIG_FILE_SYSTEM_LITTLEFS=y  # needs ZEPHYR_LITTLEFS_MODULE registered first
